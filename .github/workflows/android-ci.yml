name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    name: Lint · Test · Coverage · Sonar · APK
    runs-on: ubuntu-latest

    env:
      # Keeps Gradle from spawning a daemon that outlives the runner
      GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    steps:
      # ──────────────────────────────────────────────
      # 1. Source
      # ──────────────────────────────────────────────
      - name: Checkout (full depth for Sonar blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # Sonar needs full history for new-code analysis

      # ──────────────────────────────────────────────
      # 2. Java
      # ──────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle           # caches ~/.gradle between runs

      # ──────────────────────────────────────────────
      # 3. Android SDK  (GitHub-hosted runners already have it)
      # ──────────────────────────────────────────────
      #    The ubuntu-latest runner ships with Android SDK + build-tools.
      #    No manual install needed — unlike Bitbucket Pipelines.

      # ──────────────────────────────────────────────
      # 4. Secrets → local.properties
      # ──────────────────────────────────────────────
#      - name: Inject secrets into local.properties
#        run: |
#          echo "${{ secrets.LOCAL_PROPERTIES_B64 }}" | base64 --decode > local.properties
        # Store your local.properties file base64-encoded as a GitHub secret
        # named LOCAL_PROPERTIES_B64 (same pattern as your Bitbucket pipeline)

      # ──────────────────────────────────────────────
      # 5. Lint (ktlint)
      # ──────────────────────────────────────────────
      - name: ktlint check
        run: ./gradlew ktlintCheck

      # ──────────────────────────────────────────────
      # 6. Unit tests + JaCoCo XML report I may need t remove the command    run: ./gradlew testDebugUnitTest
      # ──────────────────────────────────────────────
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Generate JaCoCo coverage report
        run: ./gradlew jacocoFullReport

      - name: Debug — find JaCoCo XML
        run: find . -name "*.xml" -path "*/jacoco/*"
        # Produces: app/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.xml

      # ──────────────────────────────────────────────
      # 7. SonarCloud analysis
      # ──────────────────────────────────────────────
      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # enables PR decoration
        run: ./gradlew sonar
#        run: |
#          ./gradlew sonar \
#            -Dsonar.host.url=https://sonarcloud.io \
#            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
#            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
#            -Dsonar.coverage.jacoco.xmlReportPaths=app/build/reports/jacoco/jacocoUnitTestReport/jacocoUnitTestReport.xml \
#            -Dsonar.qualitygate.wait=true
        # -Dsonar.qualitygate.wait=true → fails the job if the quality gate fails.
        # Remove it if you want Sonar to be advisory-only.

      # ──────────────────────────────────────────────
      # 8. Upload Sonar report artifacts
      # ──────────────────────────────────────────────
      - name: Upload JaCoCo XML report
        if: always()              # upload even when tests fail — useful for debugging
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: app/build/reports/jacoco/jacocoFullReport/
          retention-days: 14

      - name: Upload Sonar scanner metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonar-scanner-report
          path: |
            .scannerwork/
            app/build/sonar/
          retention-days: 14

      # ──────────────────────────────────────────────
      # 9. Build debug APK
      # ──────────────────────────────────────────────
      - name: Assemble debug APK
        run: ./gradlew assembleDebug

      # ──────────────────────────────────────────────
      # 10. Upload APK artifact
      # ──────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: atrefo-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30